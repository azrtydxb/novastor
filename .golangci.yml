version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    # Core linters
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style and documentation (limited)
    - revive
    # Bug detection (limited set)
    - bodyclose
    - durationcheck
    - nilerr
    - noctx
    # Code quality (limited set - noisy ones disabled)
    - misspell
    - unconvert
    - wastedassign

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude issues in test files
    - path: _test\.go
      linters:
        - bodyclose
        - noctx
        - ineffassign
    # Main functions use net.Listen without context (acceptable for entry points)
    - path: cmd/
      linters:
        - noctx
    # LVM store uses exec.Command without context (LVM commands are synchronous)
    - path: internal/chunk/
      linters:
        - noctx
    # NFS handler functions return errors via reply messages, not Go errors
    - path: internal/filer/nfs_v3\.go
      linters:
        - nilerr
    - path: internal/filer/nfs_mount\.go
      linters:
        - nilerr
  settings:
    staticcheck:
      checks:
        - "all"
    revive:
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
