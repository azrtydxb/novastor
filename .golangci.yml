version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style and documentation
    - revive
    # Bug detection
    - bodyclose
    - durationcheck
    - forcetypeassert
    - nilerr
    - noctx
    # Code quality
    - goconst
    - gocritic
    - misspell
    - prealloc
    - unconvert
    - unparam
    - wastedassign
    # Security
    - gosec
  settings:
    staticcheck:
      checks:
        - "all"
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
