kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: backendassignments.novastor.io
spec:
  group: novastor.io
  names:
    kind: BackendAssignment
    listKind: BackendAssignmentList
    plural: backendassignments
    singular: backendassignment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.poolRef
      name: Pool
      type: string
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.backendType
      name: Backend
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.device
      name: Device
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackendAssignment binds a storage backend to a specific node for a StoragePool.
          Created by the StoragePool controller, provisioned by the node agent.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              backendType:
                description: BackendType is the backend type (copied from StoragePool).
                enum:
                - file
                - lvm
                - raw
                type: string
              deviceFilter:
                description: |-
                  DeviceFilter specifies which devices to use (copied from StoragePool).
                  For raw/lvm backends only.
                properties:
                  minSize:
                    type: string
                  type:
                    enum:
                    - nvme
                    - ssd
                    - hdd
                    type: string
                type: object
              fileBackend:
                description: |-
                  FileBackend configures the file backend (copied from StoragePool).
                  For file backend only.
                properties:
                  maxCapacityBytes:
                    description: |-
                      MaxCapacityBytes is the maximum size of the backing file per node.
                      Defaults to 80% of available filesystem space if not set.
                    format: int64
                    type: integer
                  path:
                    default: /var/lib/novastor/file
                    description: |-
                      Path is the directory on each node where backing files are stored.
                      The directory must exist and be on a mounted filesystem.
                    type: string
                required:
                - path
                type: object
              nodeName:
                description: NodeName is the node this assignment targets.
                type: string
              poolRef:
                description: PoolRef is the name of the StoragePool this assignment
                  belongs to.
                type: string
            required:
            - backendType
            - nodeName
            - poolRef
            type: object
          status:
            properties:
              bdevName:
                description: BdevName is the SPDK bdev name created on this device.
                type: string
              capacity:
                description: Capacity is the device capacity in bytes.
                format: int64
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
