apiVersion: novastor.io/v1alpha1
kind: ObjectStore
metadata:
  name: app-assets
spec:
  pool: ssd-erasurecoded
  dataProtection:
    mode: replication
    replication:
      factor: 3
      writeQuorum: 2
  endpoint:
    service:
      port: 9000
  bucketPolicy:
    maxBuckets: 100
    versioning: enabled
