syntax = "proto3";
package dataplane;

// DataplaneService is the single gRPC API between the Go management agent
// and the Rust SPDK dataplane. It replaces ALL JSON-RPC communication.
service DataplaneService {
  // --- Bdev Management ---
  rpc CreateAioBdev(CreateAioBdevRequest) returns (BdevInfo);
  rpc CreateMallocBdev(CreateMallocBdevRequest) returns (BdevInfo);
  rpc CreateLvolStore(CreateLvolStoreRequest) returns (LvolStoreInfo);
  rpc CreateLvol(CreateLvolRequest) returns (BdevInfo);
  rpc DeleteBdev(DeleteBdevRequest) returns (DeleteBdevResponse);
  rpc ListBdevs(ListBdevsRequest) returns (ListBdevsResponse);
  rpc GetBdevInfo(GetBdevInfoRequest) returns (BdevInfo);
  rpc ListLvolStores(ListLvolStoresRequest) returns (ListLvolStoresResponse);

  // --- NVMe-oF Target Management ---
  rpc InitTransport(InitTransportRequest) returns (InitTransportResponse);
  rpc CreateNvmfTarget(CreateNvmfTargetRequest) returns (NvmfTargetInfo);
  rpc DeleteNvmfTarget(DeleteNvmfTargetRequest) returns (DeleteNvmfTargetResponse);
  rpc SetAnaState(SetAnaStateRequest) returns (SetAnaStateResponse);
  rpc GetAnaState(GetAnaStateRequest) returns (GetAnaStateResponse);
  rpc ListSubsystems(ListSubsystemsRequest) returns (ListSubsystemsResponse);
  rpc ExportBdev(ExportBdevRequest) returns (ExportBdevResponse);

  // --- NVMe-oF Initiator ---
  rpc ConnectInitiator(ConnectInitiatorRequest) returns (ConnectInitiatorResponse);
  rpc DisconnectInitiator(DisconnectInitiatorRequest) returns (DisconnectInitiatorResponse);

  // --- Replica Bdev ---
  rpc CreateReplicaBdev(CreateReplicaBdevRequest) returns (CreateReplicaBdevResponse);
  rpc ReplicaStatus(ReplicaStatusRequest) returns (ReplicaStatusResponse);

  // --- Chunk Store ---
  rpc InitChunkStore(InitChunkStoreRequest) returns (InitChunkStoreResponse);
  rpc ChunkStoreStats(ChunkStoreStatsRequest) returns (ChunkStoreStatsResponse);
  rpc WriteChunk(stream WriteChunkRequest) returns (WriteChunkResponse);
  rpc ReadChunk(ReadChunkRequest) returns (stream ReadChunkResponse);
  rpc DeleteChunk(DeleteChunkRequest) returns (DeleteChunkResponse);
  rpc ChunkExists(ChunkExistsRequest) returns (ChunkExistsResponse);
  rpc ListChunks(ListChunksRequest) returns (ListChunksResponse);
  rpc GarbageCollect(GarbageCollectRequest) returns (GarbageCollectResponse);

  // --- Inter-Dataplane Chunk Transfer (used for replication) ---
  rpc PutChunk(PutChunkRequest) returns (PutChunkResponse);
  rpc GetChunk(GetChunkRequest) returns (GetChunkResponse);

  // Inter-dataplane sub-block replication (delta sync)
  rpc PutSubBlock(PutSubBlockRequest) returns (PutSubBlockResponse);

  // --- Backend Management ---
  rpc InitBackend(InitBackendRequest) returns (InitBackendResponse);
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);

  // --- Policy Engine ---
  rpc SetVolumePolicy(SetVolumePolicyRequest) returns (SetVolumePolicyResponse);
  rpc ReconstructShard(ReconstructShardRequest) returns (ReconstructShardResponse);

  // --- Topology ---
  rpc UpdateTopology(UpdateTopologyRequest) returns (UpdateTopologyResponse);

  // --- Metadata Sync ---
  rpc GetChunkMaps(GetChunkMapsRequest) returns (GetChunkMapsResponse);

  // SyncChunkMaps returns all chunk map entries whose generation is strictly
  // greater than since_generation. Used as a periodic safety net to recover
  // any NDP broadcast updates that were missed.
  rpc SyncChunkMaps(SyncChunkMapsRequest) returns (SyncChunkMapsResponse);

  // --- Health & Fencing ---
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// Bdev messages
message CreateAioBdevRequest {
  string name = 1;
  string device_path = 2;
  uint32 block_size = 3;
}

message CreateMallocBdevRequest {
  string name = 1;
  uint64 size_mb = 2;
  uint32 block_size = 3;
}

message BdevInfo {
  string name = 1;
  string device_path = 2;
  uint32 block_size = 3;
  uint64 num_blocks = 4;
  string bdev_type = 5;
  uint64 size_bytes = 6;
}

message CreateLvolStoreRequest {
  string bdev_name = 1;
  string lvs_name = 2;
  uint32 cluster_size = 3;
}

message LvolStoreInfo {
  string uuid = 1;
  string name = 2;
  string base_bdev = 3;
  uint32 cluster_size = 4;
  uint64 total_clusters = 5;
  uint64 free_clusters = 6;
}

message CreateLvolRequest {
  string lvs_name = 1;
  string lvol_name = 2;
  uint64 size_bytes = 3;
  bool thin_provision = 4;
}

message DeleteBdevRequest { string name = 1; }
message DeleteBdevResponse {}
message ListBdevsRequest {}
message ListBdevsResponse { repeated BdevInfo bdevs = 1; }
message GetBdevInfoRequest { string name = 1; }
message ListLvolStoresRequest {}
message ListLvolStoresResponse { repeated LvolStoreInfo stores = 1; }

// NVMe-oF Target messages
message InitTransportRequest {}
message InitTransportResponse {}

message CreateNvmfTargetRequest {
  string volume_id = 1;
  string bdev_name = 2;
  string listen_address = 3;
  uint32 listen_port = 4;
  string ana_state = 5;
  uint32 ana_group_id = 6;
}

message NvmfTargetInfo {
  string nqn = 1;
  string bdev_name = 2;
  string listen_address = 3;
  uint32 listen_port = 4;
  uint32 ana_group_id = 5;
  string ana_state = 6;
}

message DeleteNvmfTargetRequest { string volume_id = 1; }
message DeleteNvmfTargetResponse {}

message SetAnaStateRequest {
  string volume_id = 1;
  string ana_state = 2;
  uint32 ana_group_id = 3;
}
message SetAnaStateResponse {}

message GetAnaStateRequest { string volume_id = 1; }
message GetAnaStateResponse {
  string ana_state = 1;
  uint32 ana_group_id = 2;
}

message ListSubsystemsRequest {}
message SubsystemInfo {
  string nqn = 1;
  string bdev_name = 2;
  string listen_address = 3;
  uint32 listen_port = 4;
  string ana_state = 5;
}
message ListSubsystemsResponse { repeated SubsystemInfo subsystems = 1; }

message ExportBdevRequest {
  string nqn = 1;
  string bdev_name = 2;
  uint32 nsid = 3;
}
message ExportBdevResponse { uint32 nsid = 1; }

// NVMe-oF Initiator messages
message ConnectInitiatorRequest {
  string address = 1;
  string port = 2;
  string nqn = 3;
}
message ConnectInitiatorResponse {
  string bdev_name = 1;
  string nqn = 2;
}

message DisconnectInitiatorRequest { string nqn = 1; }
message DisconnectInitiatorResponse {}

// Replica Bdev messages
message ReplicaTarget {
  string bdev_name = 1;
  bool is_local = 2;
}
message CreateReplicaBdevRequest {
  string volume_id = 1;
  repeated ReplicaTarget targets = 2;
  uint64 size_bytes = 3;
  string read_policy = 4;
}
message CreateReplicaBdevResponse { string bdev_name = 1; }

message ReplicaStatusRequest { string volume_id = 1; }
message ReplicaStatusResponse {
  string volume_id = 1;
  string bdev_name = 2;
  uint32 num_targets = 3;
  string status = 4;
}

// Chunk Store messages
message InitChunkStoreRequest {
  string bdev_name = 1;
  // Real node ID from the Go agent (e.g. "worker-22"). If empty, falls back
  // to "local-<bdev_name>" for backward compatibility. This must match the
  // node_id used in UpdateTopology so CRUSH local-placement works correctly.
  string node_id = 2;
}
message InitChunkStoreResponse {
  uint64 total_slots = 1;
  uint64 used_slots = 2;
  uint64 chunk_size = 3;
}

message ChunkStoreStatsRequest { string bdev_name = 1; }
message ChunkStoreStatsResponse {
  uint64 total_slots = 1;
  uint64 used_slots = 2;
  uint64 free_slots = 3;
  uint64 chunk_size = 4;
}

message WriteChunkRequest {
  string chunk_id = 1;
  bytes data = 2;
  string bdev_name = 3;
}
message WriteChunkResponse {
  string chunk_id = 1;
  int64 bytes_written = 2;
}

message ReadChunkRequest {
  string chunk_id = 1;
  string bdev_name = 2;
}
message ReadChunkResponse {
  string chunk_id = 1;
  bytes data = 2;
}

message DeleteChunkRequest {
  string chunk_id = 1;
  string bdev_name = 2;
}
message DeleteChunkResponse {}

message ChunkExistsRequest {
  string chunk_id = 1;
  string bdev_name = 2;
}
message ChunkExistsResponse { bool exists = 1; }

message ListChunksRequest { string bdev_name = 1; }
message ListChunksResponse { repeated string chunk_ids = 1; }

message GarbageCollectRequest {
  string bdev_name = 1;
  repeated string live_chunk_ids = 2;
}
message GarbageCollectResponse {
  uint32 deleted = 1;
  uint32 errors = 2;
}

// Inter-Dataplane Chunk Transfer messages
message PutChunkRequest {
  string chunk_id = 1;
  bytes data = 2;
}
message PutChunkResponse {}

message GetChunkRequest {
  string chunk_id = 1;
}
message GetChunkResponse {
  bytes data = 1;
}

// Backend Management messages
message InitBackendRequest {
  string backend_type = 1;
  string config_json = 2;
}
message InitBackendResponse {}

message CreateVolumeRequest {
  string backend_type = 1;
  string name = 2;
  uint64 size_bytes = 3;
  // Protection scheme for the volume. If not set, defaults to replication
  // with factor 1 (no redundancy).
  ProtectionScheme protection = 4;
  // When true, no local chunk store is required. The node acts as a
  // frontend-only presenter — all I/O routes to remote backends via NDP.
  bool frontend_only = 5;
}
message CreateVolumeResponse {
  string name = 1;
  uint64 size_bytes = 2;
}

// ProtectionScheme describes the data protection for a volume.
message ProtectionScheme {
  // "replication" or "erasure_coding"
  string mode = 1;
  // For replication: number of copies (e.g. 3 = triple replication).
  uint32 replication_factor = 2;
  // For erasure coding: number of data shards (e.g. 4).
  uint32 data_shards = 3;
  // For erasure coding: number of parity shards (e.g. 2).
  uint32 parity_shards = 4;
}

message DeleteVolumeRequest {
  string backend_type = 1;
  string name = 2;
}
message DeleteVolumeResponse {}

// Health & Fencing messages
message GetVersionRequest {}
message GetVersionResponse {
  string version = 1;
  string commit = 2;
}

message HeartbeatRequest {
  string node_id = 1;
  int64 timestamp = 2;
}
message HeartbeatResponse {
  bool fenced = 1;
  string status = 2;
}

// Policy Engine messages
message SetVolumePolicyRequest {
  string volume_id = 1;
  uint32 desired_replicas = 2;
  // For erasure coding: set data_shards and parity_shards (desired_replicas=0).
  uint32 data_shards = 3;
  uint32 parity_shards = 4;
}
message SetVolumePolicyResponse {
  bool accepted = 1;
}

// EC Shard Reconstruction messages
message ReconstructShardRequest {
  string chunk_id = 1;        // Original chunk ID
  uint32 shard_index = 2;     // Which shard to reconstruct
  uint32 data_shards = 3;     // EC parameters
  uint32 parity_shards = 4;
  string target_node = 5;     // Where to place the reconstructed shard
}

message ReconstructShardResponse {
  bool success = 1;
}

// Topology messages
message TopologyNode {
  string node_id = 1;
  string address = 2;
  uint32 port = 3;
  repeated TopologyBackend backends = 4;
  string status = 5;
}
message TopologyBackend {
  string id = 1;
  string node_id = 2;
  uint64 capacity_bytes = 3;
  uint64 used_bytes = 4;
  uint32 weight = 5;
  string backend_type = 6;
}
message VolumeInfo {
  string name = 1;
  uint64 size_bytes = 2;
  string protection_type = 3;
  uint32 rep_factor = 4;
  uint32 data_shards = 5;
  uint32 parity_shards = 6;
  string status = 7;
}

message UpdateTopologyRequest {
  uint64 generation = 1;
  repeated TopologyNode nodes = 2;
  repeated VolumeInfo volumes = 3;
}
message UpdateTopologyResponse {
  bool accepted = 1;
}

// Metadata Sync messages
message ChunkMapUpdate {
  string volume_id = 1;
  uint64 chunk_index = 2;
  uint64 dirty_bitmap = 3;
  repeated string placements = 4;
  uint64 generation = 5;
}

message SyncChunkMapsRequest {
  uint64 since_generation = 1;
}

message SyncChunkMapsResponse {
  repeated ChunkMapUpdate updates = 1;
}

message ChunkMapEntryProto {
  string volume_id = 1;
  uint64 chunk_index = 2;
  string chunk_id = 3;
  uint64 offset = 4;
  uint32 length = 5;
}
message GetChunkMapsRequest {
  string bdev_name = 1;
}
message GetChunkMapsResponse {
  repeated ChunkMapEntryProto entries = 1;
  uint32 volume_count = 2;
}

// Sub-block delta replication
message PutSubBlockRequest {
  string volume_id = 1;
  uint64 chunk_index = 2;
  uint32 sub_block_index = 3;
  bytes data = 4;
}
message PutSubBlockResponse {}
