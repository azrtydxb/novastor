name: LVM Store Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lvm-tests:
    name: LVM Store Tests
    runs-on: qnap-nas
    steps:
      - name: Load dm-thin-pool kernel module
        run: |
          sudo modprobe dm_thin_pool
          sudo modprobe dm_snapshot

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lvm2 thin-provisioning-tools

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup loop devices
        run: |
          sudo truncate -s 1G /tmp/loop1.img
          sudo truncate -s 1G /tmp/loop2.img
          sudo losetup /dev/loop0 /tmp/loop1.img
          sudo losetup /dev/loop1 /tmp/loop2.img

      - name: Setup LVM
        run: |
          sudo pvcreate /dev/loop0 /dev/loop1
          sudo vgcreate novastor-test /dev/loop0 /dev/loop1
          sudo lvcreate -L 512M -T novastor-test/thinpool

      - name: Run LVM tests
        run: sudo -E go test -v ./internal/chunk/... -run LVM
        env:
          LVM_VG_NAME: novastor-test
          LVM_THIN_POOL: thinpool
