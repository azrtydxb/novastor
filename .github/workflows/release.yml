name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: qnap-nas
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
        binary:
          - controller
          - agent
          - meta
          - csi
          - filer
          - s3gw
          - cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_NAME: ${{ matrix.binary }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${BUILD_DATE}" \
            -o "bin/novastor-${BINARY_NAME}-${GOOS}-${GOARCH}" \
            "./cmd/${BINARY_NAME}/"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: novastor-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: qnap-nas
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum novastor-* > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/novastor-*
            artifacts/SHA256SUMS

  docker-images:
    name: "Docker ${{ matrix.image.name }} (${{ matrix.arch.name }})"
    needs: build-binaries
    strategy:
      matrix:
        arch:
          - name: amd64
            runner: qnap-nas
          - name: arm64
            runner: ubuntu-24.04-arm
        image:
          - name: controller
            dockerfile: build/Dockerfile.controller
          - name: agent
            dockerfile: build/Dockerfile.agent
          - name: meta
            dockerfile: build/Dockerfile.meta
          - name: csi
            dockerfile: build/Dockerfile.csi
          - name: filer
            dockerfile: build/Dockerfile.filer
          - name: s3gw
            dockerfile: build/Dockerfile.s3gw
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version tags
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          # v1.2.3 -> 1.2.3
          FULL="${VERSION#v}"
          # 1.2.3 -> 1.2
          MINOR="${FULL%.*}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.arch.name }}
          push: true
          tags: |
            ghcr.io/azrtydxb/novastor/novastor-${{ matrix.image.name }}:v${{ steps.version.outputs.full }}-${{ matrix.arch.name }}
            ghcr.io/azrtydxb/novastor/novastor-${{ matrix.image.name }}:v${{ steps.version.outputs.minor }}-${{ matrix.arch.name }}
            ghcr.io/azrtydxb/novastor/novastor-${{ matrix.image.name }}:sha-${{ github.sha }}-${{ matrix.arch.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: "Docker Manifest ${{ matrix.image }}"
    runs-on: qnap-nas
    needs: docker-images
    steps:
      - name: Extract version tags
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          FULL="${VERSION#v}"
          MINOR="${FULL%.*}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/novastor/novastor-${{ matrix.image }}
        run: |
          FULL="v${{ steps.version.outputs.full }}"
          MINOR="v${{ steps.version.outputs.minor }}"
          SHA="sha-${{ github.sha }}"

          for TAG in "${FULL}" "${MINOR}" "${SHA}"; do
            docker manifest create ${IMAGE}:${TAG} \
              --amend ${IMAGE}:${TAG}-amd64 \
              --amend ${IMAGE}:${TAG}-arm64
            docker manifest push ${IMAGE}:${TAG}
          done
    strategy:
      matrix:
        image:
          - controller
          - agent
          - meta
          - csi
          - filer
          - s3gw
