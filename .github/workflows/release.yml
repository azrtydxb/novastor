name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
        binary:
          - controller
          - agent
          - meta
          - csi
          - filer
          - s3gw
          - cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_NAME: ${{ matrix.binary }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${BUILD_DATE}" \
            -o "bin/novastor-${BINARY_NAME}-${GOOS}-${GOARCH}" \
            "./cmd/${BINARY_NAME}/"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: novastor-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum novastor-* > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/novastor-*
            artifacts/SHA256SUMS

  docker-images:
    name: Docker Images
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: controller
            dockerfile: build/Dockerfile.controller
          - name: agent
            dockerfile: build/Dockerfile.agent
          - name: meta
            dockerfile: build/Dockerfile.meta
          - name: csi
            dockerfile: build/Dockerfile.csi
          - name: filer
            dockerfile: build/Dockerfile.filer
          - name: s3gw
            dockerfile: build/Dockerfile.s3gw
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/piwi3910/novastor/novastor-${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
