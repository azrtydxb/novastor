---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: backendassignments.novastor.io
spec:
  group: novastor.io
  names:
    kind: BackendAssignment
    listKind: BackendAssignmentList
    plural: backendassignments
    singular: backendassignment
    shortNames:
      - ba
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.poolRef
      name: Pool
      type: string
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.backendType
      name: Backend
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.device
      name: Device
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BackendAssignment binds a storage backend to a specific node
          for a StoragePool. Created by the StoragePool controller, provisioned by
          the node agent.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              backendType:
                description: BackendType is the backend type (copied from StoragePool).
                enum:
                  - file
                  - lvm
                  - raw
                type: string
              deviceFilter:
                description: DeviceFilter specifies which devices to use (copied from
                  StoragePool). For raw/lvm backends only.
                properties:
                  minSize:
                    type: string
                  type:
                    enum:
                      - nvme
                      - ssd
                      - hdd
                    type: string
                type: object
              fileBackend:
                description: FileBackend configures the file backend (copied from
                  StoragePool). For file backend only.
                properties:
                  maxCapacityBytes:
                    format: int64
                    type: integer
                  path:
                    default: /var/lib/novastor/file
                    type: string
                required:
                  - path
                type: object
              nodeName:
                description: NodeName is the node this assignment targets.
                type: string
              poolRef:
                description: PoolRef is the name of the StoragePool this assignment
                  belongs to.
                type: string
            required:
              - backendType
              - nodeName
              - poolRef
            type: object
          status:
            properties:
              bdevName:
                description: BdevName is the SPDK bdev name created on this device.
                type: string
              capacity:
                description: Capacity is the device capacity in bytes.
                format: int64
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                        - "True"
                        - "False"
                        - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                    - lastTransitionTime
                    - message
                    - reason
                    - status
                    - type
                  type: object
                type: array
              device:
                description: Device is the resolved device path (e.g., /dev/nvme0n1).
                type: string
              message:
                description: Message provides details about the current phase.
                type: string
              pcieAddr:
                description: PCIeAddr is the PCIe BDF address for NVMe devices.
                type: string
              phase:
                description: Phase is the provisioning state.
                enum:
                  - Pending
                  - Provisioning
                  - Ready
                  - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
