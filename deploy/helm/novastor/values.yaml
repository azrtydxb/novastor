crds:
  # install controls whether CRDs are installed as part of the Helm release.
  # Set to false if you manage CRDs separately (e.g. via kubectl apply -f deploy/crds/).
  install: true

global:
  image:
    registry: ghcr.io/piwi3910
    tag: "0.1.0"
    pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: ""

controller:
  replicas: 1
  image:
    repository: novastor-controller
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  leaderElect: true
  nodeSelector: {}
  tolerations: []
  affinity: {}

meta:
  replicas: 3
  image:
    repository: novastor-meta
  storage: 10Gi
  storageClassName: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  raft:
    # raftPort -- TCP port for Raft consensus transport between peers.
    raftPort: 7000
    # grpcPort -- TCP port for the gRPC client API.
    grpcPort: 7001
    # metricsPort -- TCP port for Prometheus metrics.
    metricsPort: 7002

agent:
  image:
    repository: novastor-agent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
  nodeSelector: {}
  tolerations: []

csi:
  controller:
    replicas: 1
    image:
      repository: novastor-csi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  node:
    image:
      repository: novastor-csi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  provisioner:
    image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  snapshotter:
    image: registry.k8s.io/sig-storage/csi-snapshotter:v8.0.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  resizer:
    image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  registrar:
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.11.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

s3gw:
  replicas: 2
  image:
    repository: novastor-s3gw
  accessKey: ""
  secretKey: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

filer:
  replicas: 1
  image:
    repository: novastor-filer
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

storageClass:
  name: novastor-block
  isDefault: false
  pool: nvme-replicated
  dataProtection: replication
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer

storageClasses:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

monitoring:
  serviceMonitor:
    # enabled -- Set to true to create ServiceMonitor resources for Prometheus Operator discovery.
    enabled: false
    # labels -- Additional labels to add to ServiceMonitor resources (e.g. for Prometheus Operator label selectors).
    labels: {}
    # interval -- Prometheus scrape interval.
    interval: 30s
    # scrapeTimeout -- Prometheus scrape timeout.
    scrapeTimeout: 10s
  grafana:
    # enabled -- Set to true to create a ConfigMap with Grafana dashboards for sidecar auto-discovery.
    enabled: false
