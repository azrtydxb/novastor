crds:
  # install controls whether CRDs are installed as part of the Helm release.
  # Set to false if you manage CRDs separately (e.g. via kubectl apply -f deploy/crds/).
  install: true

global:
  image:
    registry: 192.168.100.11:30500/novastor
    tag: "latest"
    pullPolicy: Always
  imagePullSecrets: []
  tls:
    # enabled -- Enable mutual TLS for all inter-component gRPC communication.
    # When true, a bootstrap Job generates CA and leaf certificates,
    # stored in a Secret mounted by all components.
    enabled: true
    # bootstrapImage -- Image used for the certificate bootstrap Job.
    # Uses the main controller image by default which includes the
    # certificate generation logic from internal/transport/certgen.go.
    bootstrapImage:
      registry: 192.168.100.11:30500/novastor
      repository: novastor-controller
      tag: "latest"
    # rotationInterval -- Interval for certificate rotation checks.
    # The bootstrap Job creates 1-year certificates; this controls
    # how often components check for updated certificates in the Secret.
    rotationInterval: 5m
    # ca -- Pre-existing CA certificate and key. If provided, these will be
    # used instead of generating a new CA. Set this to null to enable
    # automatic CA generation.
    # externalSecret -- Set to true if you manage the TLS secret externally
    # (e.g. created manually or via cert-manager). When true, the chart
    # will not create the novastor-tls-certs Secret.
    externalSecret: false
    ca:
      certPEM: null
      keyPEM: null
    # server -- Pre-existing server certificate and key for gRPC endpoints.
    server:
      certPEM: null
      keyPEM: null
    # client -- Pre-existing client certificate and key for gRPC clients.
    client:
      certPEM: null
      keyPEM: null

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: ""

controller:
  replicas: 1
  image:
    repository: novastor-controller
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  leaderElect: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    # enabled -- Create a Service for the controller to expose metrics and health endpoints
    enabled: true
    # type -- Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    # annotations -- Additional annotations for the service
    annotations: {}
    ports:
      # metrics -- Port for Prometheus metrics endpoint
      metrics: 8080
      # health -- Port for health probe endpoint
      health: 8081

meta:
  replicas: 3
  image:
    repository: novastor-meta
  # hostPath -- Path on the host node for Raft logs and BadgerDB data.
  # NovaStor cannot use PVCs for its own metadata (chicken-and-egg problem).
  # Each meta pod is pinned to a unique node via pod anti-affinity.
  hostPath: /var/lib/novastor/meta
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  raft:
    # raftPort -- TCP port for Raft consensus transport between peers.
    raftPort: 7000
    # grpcPort -- TCP port for the gRPC client API.
    grpcPort: 7001
    # metricsPort -- TCP port for Prometheus metrics.
    metricsPort: 7002

agent:
  image:
    repository: novastor-agent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
  nodeSelector: {}
  tolerations: []
  heartbeatInterval: "500ms"    # Fast heartbeat for failover detection
  spdkBaseBdev: "NVMe0n1"       # SPDK base bdev for storage backend (NVMe0n1 for real NVMe; override to Malloc0 + testMode for testing)
  testMode: false               # Test mode only: set to true with spdkBaseBdev=Malloc0 for dev/CI environments
  failover:
    enabled: true
    katoTimeout: "200ms"        # SPDK keep-alive timeout

dataplane:
  enabled: true
  image:
    repository: novastor-dataplane
  reactorMask: "0x1"
  memSize: 1800
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
      hugepages-2Mi: 2Gi
    requests:
      cpu: "1"
      memory: 1Gi
      hugepages-2Mi: 2Gi
  nodeSelector: {}
  tolerations: []

csi:
  controller:
    replicas: 1
    image:
      repository: novastor-csi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  node:
    image:
      repository: novastor-csi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  provisioner:
    timeout: "1800s"            # Large timeout: chunk-level provisioning takes ~300ms/chunk (10Gi=2560 chunks≈13min)
    image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  snapshotter:
    image: registry.k8s.io/sig-storage/csi-snapshotter:v8.0.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  resizer:
    image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  registrar:
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.11.1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

s3gw:
  replicas: 2
  image:
    repository: novastor-s3gw
  accessKey: ""
  secretKey: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

filer:
  replicas: 1
  image:
    repository: novastor-filer
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

scheduler:
  webhook:
    # enabled -- Set to true to deploy the mutating webhook that injects the NovaStor scheduler name.
    enabled: true
    replicas: 2
    image:
      repository: novastor-webhook
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    service:
      type: ClusterIP
      metricsEnabled: true
    # failurePolicy -- Failure policy for the webhook. "Ignore" allows pod creation to proceed if webhook is down.
    failurePolicy: Ignore
    # timeoutSeconds -- Timeout for the webhook admission request.
    timeoutSeconds: 5
    cert:
      # existingSecret -- Name of an existing secret containing TLS cert/key. If empty, certificates are auto-generated.
      existingSecret: ""
      # cert -- PEM-encoded TLS certificate (only used when existingSecret is set).
      cert: ""
      # key -- PEM-encoded TLS private key (only used when existingSecret is set).
      key: ""

storageClass:
  name: novastor-block
  isDefault: false
  pool: nvme-raw
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer

storageClasses:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

monitoring:
  serviceMonitor:
    # enabled -- Set to true to create ServiceMonitor resources for Prometheus Operator discovery.
    enabled: false
    # labels -- Additional labels to add to ServiceMonitor resources (e.g. for Prometheus Operator label selectors).
    labels: {}
    # interval -- Prometheus scrape interval.
    interval: 30s
    # scrapeTimeout -- Prometheus scrape timeout.
    scrapeTimeout: 10s
  grafana:
    # enabled -- Set to true to create a ConfigMap with Grafana dashboards for sidecar auto-discovery.
    enabled: false
