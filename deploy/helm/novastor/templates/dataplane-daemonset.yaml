{{- if .Values.dataplane.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novastor.fullname" . }}-dataplane
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: dataplane
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dataplane
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dataplane
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: true
      hostPID: true
      containers:
        - name: dataplane
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.dataplane.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --rpc-socket
            - /var/tmp/novastor-spdk.sock
            - --reactor-mask
            - {{ .Values.dataplane.reactorMask | quote }}
            - --mem-size
            - {{ .Values.dataplane.memSize | quote }}
            - --grpc-port
            - "9500"
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca-cert={{ include "novastor.tls.caPath" . }}
            - --tls-server-cert={{ include "novastor.tls.serverCertPath" . }}
            - --tls-server-key={{ include "novastor.tls.serverKeyPath" . }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: 9500
              protocol: TCP
            - name: nvmeof
              containerPort: 4430
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            - name: hugepages
              mountPath: /dev/hugepages
            - name: shm
              mountPath: /dev/shm
            - name: spdk-socket
              mountPath: /var/tmp
            - name: chunk-data
              mountPath: /var/lib/novastor/chunks
            - name: metadata
              mountPath: /var/lib/novastor/metadata
            - name: policy-data
              mountPath: /var/lib/novastor/policy
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.dataplane.resources | nindent 12 }}
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: hugepages
          emptyDir:
            medium: HugePages
            sizeLimit: 2Gi
        - name: shm
          hostPath:
            path: /dev/shm
        - name: spdk-socket
          hostPath:
            path: /var/tmp
            type: DirectoryOrCreate
        - name: chunk-data
          hostPath:
            path: /var/lib/novastor/chunks
            type: DirectoryOrCreate
        - name: metadata
          hostPath:
            path: /var/lib/novastor/metadata
            type: DirectoryOrCreate
        - name: policy-data
          hostPath:
            path: /var/lib/novastor/policy
            type: DirectoryOrCreate
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0444
        {{- end }}
      {{- with .Values.dataplane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataplane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
