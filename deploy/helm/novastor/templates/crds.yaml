apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backendassignments.novastor.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
spec:
  group: novastor.io
  names:
    kind: BackendAssignment
    listKind: BackendAssignmentList
    plural: backendassignments
    singular: backendassignment
    shortNames:
      - ba
    categories:
      - novastor
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Pool
          type: string
          jsonPath: .spec.poolRef
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Backend
          type: string
          jsonPath: .spec.backendType
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Device
          type: string
          jsonPath: .status.device
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: BackendAssignment binds a storage backend to a specific node for a StoragePool.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: BackendAssignmentSpec defines the desired backend for a node.
              type: object
              required:
                - poolRef
                - nodeName
                - backendType
              properties:
                poolRef:
                  description: PoolRef is the name of the StoragePool this assignment belongs to.
                  type: string
                nodeName:
                  description: NodeName is the node this assignment targets.
                  type: string
                backendType:
                  description: BackendType is the backend type (file, lvm, or raw).
                  type: string
                  enum:
                    - file
                    - lvm
                    - raw
                deviceFilter:
                  description: DeviceFilter specifies which devices to use (for raw/lvm backends).
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - nvme
                        - ssd
                        - hdd
                    minSize:
                      type: string
                fileBackend:
                  description: FileBackend configures the file backend (for file backend only).
                  type: object
                  required:
                    - path
                  properties:
                    path:
                      type: string
                      default: /var/lib/novastor/file
                    maxCapacityBytes:
                      type: integer
                      format: int64
            status:
              description: BackendAssignmentStatus defines the observed provisioning state.
              type: object
              properties:
                phase:
                  description: Phase is the provisioning state.
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Failed
                device:
                  description: Device is the resolved device path (e.g., /dev/nvme0n1).
                  type: string
                pcieAddr:
                  description: PCIeAddr is the PCIe BDF address for NVMe devices.
                  type: string
                bdevName:
                  description: BdevName is the SPDK bdev name created on this device.
                  type: string
                capacity:
                  description: Capacity is the device capacity in bytes.
                  type: integer
                  format: int64
                message:
                  description: Message provides details about the current phase.
                  type: string
                conditions:
                  description: Conditions reflect the current reconciliation state.
                  type: array
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
