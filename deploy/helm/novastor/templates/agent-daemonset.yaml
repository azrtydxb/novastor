apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novastor.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostPID: true
      initContainers:
        - name: load-nvme-modules
          image: busybox:1.36
          command: ["sh", "-c", "modprobe nvmet || true; modprobe nvmet-tcp || true"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: sys
              mountPath: /sys
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
      containers:
        - name: agent
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.agent.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --listen=0.0.0.0:9100
            - --meta-addr={{ include "novastor.fullname" . }}-meta:7000
            - --host-ip=$(HOST_IP)
            - --pod-ip=$(POD_IP)
          securityContext:
            privileged: true
          ports:
            - name: grpc
              containerPort: 9100
              protocol: TCP
            - name: metrics
              containerPort: 9101
              protocol: TCP
            - name: nvmeof
              containerPort: 4420
              # hostPort 4420 is required to be free on each node; if another
              # process is using this port on the host, the agent pod will fail to start.
              hostPort: 4420
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            - name: chunks
              mountPath: /var/lib/novastor/chunks
            - name: volumes
              mountPath: /var/lib/novastor/volumes
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: chunks
          hostPath:
            path: /var/lib/novastor/chunks
            type: DirectoryOrCreate
        - name: volumes
          hostPath:
            path: /var/lib/novastor/volumes
            type: DirectoryOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
