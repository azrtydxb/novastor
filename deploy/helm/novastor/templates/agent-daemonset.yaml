apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novastor.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable=1 ensures one node at a time is updated. With hostNetwork,
      # the old pod must fully terminate before the new pod can bind the same ports.
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostPID: true
      initContainers:
        - name: load-nvme-modules
          image: busybox:1.36
          command: ["sh", "-c", "modprobe nvmet || true; modprobe nvmet-tcp || true"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: sys
              mountPath: /sys
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
        {{- if include "novastor.tls.enabled" . }}
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.serverCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
        {{- end }}
      containers:
        - name: agent
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.agent.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --listen=0.0.0.0:9100
            - --meta-addr={{ include "novastor.fullname" . }}-meta-headless.{{ .Release.Namespace }}.svc.cluster.local:7001
            - --node-id=$(NODE_NAME)
            - --host-ip=$(HOST_IP)
            - --pod-ip=$(POD_IP)
            - --heartbeat-interval={{ .Values.agent.heartbeatInterval }}
            {{- if .Values.dataplane.enabled }}
            - --dataplane-required=true
            - --spdk-socket=/var/tmp/novastor-spdk.sock
            {{- else }}
            - --dataplane-required=false
            {{- end }}
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca={{ include "novastor.tls.caPath" . }}
            - --tls-cert={{ include "novastor.tls.serverCertPath" . }}
            - --tls-key={{ include "novastor.tls.serverKeyPath" . }}
            - --tls-client-cert={{ include "novastor.tls.clientCertPath" . }}
            - --tls-client-key={{ include "novastor.tls.clientKeyPath" . }}
            - --tls-rotation-interval={{ .Values.global.tls.rotationInterval }}
            {{- end }}
          securityContext:
            privileged: true
          ports:
            - name: grpc
              containerPort: 9100
              protocol: TCP
            - name: metrics
              containerPort: 9101
              protocol: TCP
            - name: nvmeof
              containerPort: 4420
              # hostPort 4420 is required to be free on each node; if another
              # process is using this port on the host, the agent pod will fail to start.
              hostPort: 4420
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            - name: chunks
              mountPath: /var/lib/novastor/chunks
            - name: volumes
              mountPath: /var/lib/novastor/volumes
            {{- if .Values.dataplane.enabled }}
            - name: spdk-socket
              mountPath: /var/tmp
            {{- end }}
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: chunks
          hostPath:
            path: /var/lib/novastor/chunks
            type: DirectoryOrCreate
        - name: volumes
          hostPath:
            path: /var/lib/novastor/volumes
            type: DirectoryOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        {{- if .Values.dataplane.enabled }}
        - name: spdk-socket
          hostPath:
            path: /var/tmp
            type: DirectoryOrCreate
        {{- end }}
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
