apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "novastor.fullname" . }}-csi-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-node
spec:
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: csi-node
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: csi-node
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: load-nvme-tcp
          image: busybox:1.36
          command: ["sh", "-c", "modprobe nvme-tcp || true"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: sys
              mountPath: /sys
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
        {{- if include "novastor.tls.enabled" . }}
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.clientCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
        {{- end }}
        - name: set-nvme-multipath
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo round-robin > /sys/module/nvme_core/parameters/iopolicy 2>/dev/null || true
              echo "NVMe multipath iopolicy set to round-robin"
              # Write a stable hostnqn so all nvme connect calls from this
              # node use the same identity. Required for kernel NVMe multipath
              # to group paths under a single subsystem.
              mkdir -p /etc/nvme
              if [ ! -f /etc/nvme/hostnqn ]; then
                HOSTUUID=$(cat /sys/class/dmi/id/product_uuid 2>/dev/null | tr '[:upper:]' '[:lower:]')
                if [ -z "$HOSTUUID" ]; then
                  HOSTUUID=$(echo -n "novastor-$(hostname)" | md5sum | sed 's/\(.\{8\}\)\(.\{4\}\)\(.\{4\}\)\(.\{4\}\)\(.\{12\}\).*/\1-\2-\3-\4-\5/')
                fi
                echo "nqn.2014-08.org.nvmexpress:uuid:${HOSTUUID}" > /etc/nvme/hostnqn
              fi
              echo "hostnqn: $(cat /etc/nvme/hostnqn)"
          securityContext:
            privileged: true
          volumeMounts:
            - name: nvme-config
              mountPath: /etc/nvme
      containers:
        - name: csi-plugin
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.csi.node.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --node-zone=$(NODE_ZONE)
            - --node-region=$(NODE_REGION)
            - --meta-addr={{ include "novastor.fullname" . }}-meta-headless.{{ .Release.Namespace }}.svc.cluster.local:7001
            {{- if .Values.dataplane.enabled }}
            - --data-plane=spdk
            - --spdk-socket=/var/tmp/novastor-spdk.sock
            {{- end }}
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca={{ include "novastor.tls.caPath" . }}
            - --tls-cert={{ include "novastor.tls.clientCertPath" . }}
            - --tls-key={{ include "novastor.tls.clientKeyPath" . }}
            - --tls-rotation-interval={{ .Values.global.tls.rotationInterval }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_ZONE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/zone']
            - name: NODE_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          securityContext:
            privileged: true
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
            {{- if .Values.dataplane.enabled }}
            - name: spdk-socket
              mountPath: /var/tmp
            {{- end }}
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
            - name: nvme-config
              mountPath: /etc/nvme
          resources:
            {{- toYaml .Values.csi.node.resources | nindent 12 }}
        - name: node-driver-registrar
          image: {{ .Values.csi.registrar.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/novastor.csi.novastor.io/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
          resources:
            {{- toYaml .Values.csi.registrar.resources | nindent 12 }}
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/novastor.csi.novastor.io
            type: DirectoryOrCreate
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        {{- if .Values.dataplane.enabled }}
        - name: spdk-socket
          hostPath:
            path: /var/tmp
            type: DirectoryOrCreate
        {{- end }}
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
        - name: nvme-config
          hostPath:
            path: /etc/nvme
            type: DirectoryOrCreate
