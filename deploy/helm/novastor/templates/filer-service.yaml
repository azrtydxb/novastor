apiVersion: v1
kind: Service
metadata:
  name: {{ include "novastor.fullname" . }}-filer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: filer
spec:
  type: ClusterIP
  ports:
    - name: nfs
      port: 2049
      targetPort: nfs
      protocol: TCP
  selector:
    {{- include "novastor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: filer
