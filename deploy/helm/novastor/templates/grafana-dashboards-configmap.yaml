{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "novastor.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  novastor-cluster-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "NovaStor cluster overview: capacity, health, throughput, and recovery status.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Capacity",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_controller_pool_capacity_bytes)",
              "legendFormat": "Total Capacity",
              "refId": "A"
            }
          ],
          "title": "Total Cluster Capacity",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_agent_disk_bytes_used)",
              "legendFormat": "Used",
              "refId": "A"
            }
          ],
          "title": "Total Used Space",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "green", "value": 0.3 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_agent_disk_bytes_free)",
              "legendFormat": "Free",
              "refId": "A"
            }
          ],
          "title": "Total Free Space",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "title": "Node Health",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 3 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "id": 4,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_controller_pool_node_count)",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "title": "Active Nodes",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 8 },
          "id": 5,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "novastor_controller_recovery_chunks_pending",
              "legendFormat": "Pending",
              "refId": "A"
            }
          ],
          "title": "Recovery Chunks Pending",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 8 },
          "id": 6,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "novastor_csi_volume_count",
              "legendFormat": "Volumes",
              "refId": "A"
            }
          ],
          "title": "Provisioned Volumes",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Operations",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 7,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (operation) (rate(novastor_agent_chunk_ops_total[5m]))",
              "legendFormat": "{{`{{ operation }}`}}",
              "refId": "A"
            }
          ],
          "title": "Chunk Operations Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 8,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (operation) (rate(novastor_s3_requests_total[5m]))",
              "legendFormat": "{{`{{ operation }}`}}",
              "refId": "A"
            }
          ],
          "title": "S3 Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "id": 9,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (operation) (rate(novastor_filer_nfs_ops_total[5m]))",
              "legendFormat": "{{`{{ operation }}`}}",
              "refId": "A"
            }
          ],
          "title": "NFS Operation Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "id": 10,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "rate(novastor_controller_recovery_chunks_completed_total[5m])",
              "legendFormat": "recovered/s",
              "refId": "A"
            },
            {
              "expr": "novastor_controller_recovery_chunks_pending",
              "legendFormat": "pending",
              "refId": "B"
            }
          ],
          "title": "Recovery Status",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["novastor", "storage", "overview"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "NovaStor - Cluster Overview",
      "uid": "novastor-cluster-overview",
      "version": 1
    }
  novastor-agent.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Per-agent dashboard for NovaStor storage node agents: disk capacity, chunk operations, throughput, and data integrity.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "icon": "external link",
          "tags": ["novastor"],
          "title": "NovaStor Cluster Overview",
          "type": "link",
          "url": "/d/novastor-cluster-overview"
        }
      ],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Node Overview",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "novastor_agent_chunk_count{instance=~\"$instance\"}",
              "legendFormat": "Chunks",
              "refId": "A"
            }
          ],
          "title": "Total Chunks",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_agent_disk_bytes_total{instance=~\"$instance\"})",
              "legendFormat": "Total Capacity",
              "refId": "A"
            }
          ],
          "title": "Total Disk Capacity",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_agent_disk_bytes_used{instance=~\"$instance\"})",
              "legendFormat": "Used",
              "refId": "A"
            }
          ],
          "title": "Used Disk Space",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "green", "value": 0.3 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(novastor_agent_disk_bytes_free{instance=~\"$instance\"})",
              "legendFormat": "Free",
              "refId": "A"
            }
          ],
          "title": "Free Disk Space",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "title": "Chunk Operations",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "lineWidth": 2,
                "gradientMode": "scheme"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Reads" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Writes" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 5,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "last"] }
          },
          "targets": [
            {
              "expr": "rate(novastor_agent_chunk_read_ops_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Reads",
              "refId": "A"
            },
            {
              "expr": "rate(novastor_agent_chunk_write_ops_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Writes",
              "refId": "B"
            }
          ],
          "title": "Read / Write IOPS",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "lineWidth": 2,
                "gradientMode": "scheme"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Read Throughput" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Write Throughput" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 6,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "last"] }
          },
          "targets": [
            {
              "expr": "rate(novastor_agent_chunk_read_bytes_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Read Throughput",
              "refId": "A"
            },
            {
              "expr": "rate(novastor_agent_chunk_write_bytes_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Write Throughput",
              "refId": "B"
            }
          ],
          "title": "Read / Write Throughput",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 102,
          "title": "Per-Disk Breakdown",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 30,
                "pointSize": 5,
                "showPoints": "auto",
                "lineWidth": 1,
                "stacking": { "mode": "normal", "group": "A" }
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 17 },
          "id": 7,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "novastor_agent_disk_bytes_used{instance=~\"$instance\"}",
              "legendFormat": "{{`{{device}}`}} used",
              "refId": "A"
            },
            {
              "expr": "novastor_agent_disk_bytes_free{instance=~\"$instance\"}",
              "legendFormat": "{{`{{device}}`}} free",
              "refId": "B"
            }
          ],
          "title": "Disk Usage by Device (Stacked)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "orange", "value": 0.85 },
                  { "color": "red", "value": 0.95 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 17 },
          "id": 8,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "novastor_agent_disk_bytes_used{instance=~\"$instance\"} / novastor_agent_disk_bytes_total{instance=~\"$instance\"}",
              "legendFormat": "{{`{{device}}`}}",
              "refId": "A"
            }
          ],
          "title": "Disk Utilization % per Device",
          "type": "gauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 103,
          "title": "Data Integrity",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 26 },
          "id": 9,
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "rate(novastor_agent_scrub_chunks_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Scrub Rate",
              "refId": "A"
            }
          ],
          "title": "Scrub Operations Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 26 },
