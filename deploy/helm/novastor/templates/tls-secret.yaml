{{- if include "novastor.tls.enabled" . }}
{{- if not .Values.global.tls.externalSecret }}
{{- $secretName := include "novastor.tls.volumeName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.global.tls.ca.certPEM }}
{{/* User-provided PEM certificates take precedence. */}}
data:
  ca.crt: {{ .Values.global.tls.ca.certPEM | b64enc }}
  ca.key: {{ .Values.global.tls.ca.keyPEM | default "" | b64enc }}
  server.crt: {{ .Values.global.tls.server.certPEM | default "" | b64enc }}
  server.key: {{ .Values.global.tls.server.keyPEM | default "" | b64enc }}
  client.crt: {{ .Values.global.tls.client.certPEM | default "" | b64enc }}
  client.key: {{ .Values.global.tls.client.keyPEM | default "" | b64enc }}
{{- else if and $existing $existing.data (index $existing.data "ca.crt") }}
{{/* Preserve certificates already populated (by bootstrap job or previous install). */}}
data:
  ca.crt: {{ index $existing.data "ca.crt" }}
  ca.key: {{ index $existing.data "ca.key" | default "" }}
  server.crt: {{ index $existing.data "server.crt" | default "" }}
  server.key: {{ index $existing.data "server.key" | default "" }}
  client.crt: {{ index $existing.data "client.crt" | default "" }}
  client.key: {{ index $existing.data "client.key" | default "" }}
{{- else }}
{{/* No PEM provided and no existing data — the post-install/post-upgrade
     tls-bootstrap hook will populate this secret. Init containers on
     each pod wait for cert files to appear before starting. */}}
data: {}
{{- end }}
{{- end }}
{{- end }}
