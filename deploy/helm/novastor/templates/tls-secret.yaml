{{- if include "novastor.tls.enabled" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novastor.tls.volumeName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
type: Opaque
# When global.tls.ca.certPEM and keyPEM are provided, they are used directly.
# Otherwise, these are placeholder values that the bootstrap Job replaces
# with generated certificates.
data:
  {{- if .Values.global.tls.ca.certPEM }}
  ca.crt: {{ .Values.global.tls.ca.certPEM | b64enc }}
  {{- else }}
  ca.crt: ""
  {{- end }}
  {{- if .Values.global.tls.ca.keyPEM }}
  ca.key: {{ .Values.global.tls.ca.keyPEM | b64enc }}
  {{- else }}
  ca.key: ""
  {{- end }}
  # Server certificate for components that accept gRPC connections (meta, agent)
  server.crt: ""
  server.key: ""
  # Client certificate for components that initiate gRPC connections (csi, filer, s3gw, controller)
  client.crt: ""
  client.key: ""
{{- end }}
