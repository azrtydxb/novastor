apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novastor.fullname" . }}-s3gw
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: s3gw
spec:
  replicas: {{ .Values.s3gw.replicas }}
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: s3gw
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: s3gw
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if include "novastor.tls.enabled" . }}
      initContainers:
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.clientCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
      {{- end }}
      containers:
        - name: s3gw
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.s3gw.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --listen=:9000
            - --metrics-addr=:8081
            - --meta-addr={{ include "novastor.fullname" . }}-meta:7000
            - --access-key=$(S3_ACCESS_KEY)
            - --secret-key=$(S3_SECRET_KEY)
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca={{ include "novastor.tls.caPath" . }}
            - --tls-cert={{ include "novastor.tls.clientCertPath" . }}
            - --tls-key={{ include "novastor.tls.clientKeyPath" . }}
            - --tls-rotation-interval={{ .Values.global.tls.rotationInterval }}
            {{- end }}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "novastor.fullname" . }}-s3gw
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "novastor.fullname" . }}-s3gw
                  key: secret-key
          ports:
            - name: s3
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.s3gw.resources | nindent 12 }}
      volumes:
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
      {{- with .Values.s3gw.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.s3gw.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.s3gw.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
