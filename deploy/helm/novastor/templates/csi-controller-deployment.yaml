apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novastor.fullname" . }}-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
spec:
  replicas: {{ .Values.csi.controller.replicas }}
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: csi-controller
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: csi-controller
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if include "novastor.tls.enabled" . }}
      initContainers:
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.clientCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
      {{- end }}
      containers:
        - name: csi-plugin
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.csi.controller.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --endpoint=unix:///csi/csi.sock
            - --meta-addr={{ include "novastor.fullname" . }}-meta:7000
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca={{ include "novastor.tls.caPath" . }}
            - --tls-cert={{ include "novastor.tls.clientCertPath" . }}
            - --tls-key={{ include "novastor.tls.clientKeyPath" . }}
            - --tls-rotation-interval={{ .Values.global.tls.rotationInterval }}
            {{- end }}
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.csi.controller.resources | nindent 12 }}
        - name: csi-provisioner
          image: {{ .Values.csi.provisioner.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --v=5
            - --feature-gates=Topology=true
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            {{- toYaml .Values.csi.provisioner.resources | nindent 12 }}
        - name: csi-snapshotter
          image: {{ .Values.csi.snapshotter.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            {{- toYaml .Values.csi.snapshotter.resources | nindent 12 }}
        - name: csi-resizer
          image: {{ .Values.csi.resizer.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --v=5
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            {{- toYaml .Values.csi.resizer.resources | nindent 12 }}
      volumes:
        - name: socket-dir
          emptyDir: {}
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
