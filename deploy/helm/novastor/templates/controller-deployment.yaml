apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "novastor.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if include "novastor.tls.enabled" . }}
      initContainers:
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.clientCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
      {{- end }}
      containers:
        - name: controller
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.controller.image.repository }}:{{ include "novastor.imageTag" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --meta-addr={{ include "novastor.fullname" . }}-meta:7000
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --cache-sync-timeout=2m
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
