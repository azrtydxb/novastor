apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "novastor.fullname" . }}-meta
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: meta
spec:
  serviceName: {{ include "novastor.fullname" . }}-meta-headless
  replicas: {{ .Values.meta.replicas }}
  selector:
    matchLabels:
      {{- include "novastor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meta
  template:
    metadata:
      labels:
        {{- include "novastor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: meta
    spec:
      serviceAccountName: {{ include "novastor.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - chown -R 65534:65534 /data && chmod -R 775 /data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
        {{- if include "novastor.tls.enabled" . }}
        - name: wait-for-certs
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for TLS certificates to be available..."
              while [ ! -f {{ include "novastor.tls.serverCertPath" . }} ]; do
                sleep 1
              done
              echo "Certificates found, proceeding with startup"
          volumeMounts:
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
        {{- end }}
      containers:
        - name: meta
          image: "{{ include "novastor.imageRegistry" . }}/{{ .Values.meta.image.repository }}:{{ .Values.meta.image.tag | default (include "novastor.imageTag" .) }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --node-id=$(POD_NAME)
            - --data-dir=/data
            - --raft-addr=0.0.0.0:7000
            - --raft-advertise=$(POD_NAME).{{ include "novastor.fullname" . }}-meta-headless.{{ .Release.Namespace }}.svc.cluster.local:7000
            - --grpc-addr=0.0.0.0:7001
            - --metrics-addr=0.0.0.0:7002
            - --bootstrap-expect={{ .Values.meta.replicas }}
            - --join={{ include "novastor.fullname" . }}-meta-0.{{ include "novastor.fullname" . }}-meta-headless.{{ .Release.Namespace }}.svc.cluster.local:7000
            - --grpc-join={{ include "novastor.fullname" . }}-meta-0.{{ include "novastor.fullname" . }}-meta-headless.{{ .Release.Namespace }}.svc.cluster.local:7001
            {{- if include "novastor.tls.enabled" . }}
            - --tls-ca={{ include "novastor.tls.caPath" . }}
            - --tls-cert={{ include "novastor.tls.serverCertPath" . }}
            - --tls-key={{ include "novastor.tls.serverKeyPath" . }}
            - --tls-client-cert={{ include "novastor.tls.clientCertPath" . }}
            - --tls-client-key={{ include "novastor.tls.clientKeyPath" . }}
            - --tls-rotation-interval={{ .Values.global.tls.rotationInterval }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: raft
              containerPort: 7000
              protocol: TCP
            - name: grpc
              containerPort: 7001
              protocol: TCP
            - name: metrics
              containerPort: 7002
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if include "novastor.tls.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "novastor.tls.mountPath" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.meta.resources | nindent 12 }}
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.meta.hostPath | default "/var/lib/novastor/meta" }}
            type: DirectoryOrCreate
        {{- if include "novastor.tls.enabled" . }}
        - name: tls-certs
          secret:
            secretName: {{ include "novastor.tls.volumeName" . }}
            defaultMode: 0o444
        {{- end }}
      {{- with .Values.meta.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.meta.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "novastor.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: meta
              topologyKey: kubernetes.io/hostname
        {{- with .Values.meta.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
