{{- if and .Values.scheduler.webhook.enabled (not .Values.scheduler.webhook.cert.existingSecret) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "novastor.fullname" . }}-webhook-cert-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "novastor.fullname" . }}-webhook-cert-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "novastor.fullname" . }}-webhook-cert-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "novastor.fullname" . }}-webhook-cert-gen
subjects:
  - kind: ServiceAccount
    name: {{ include "novastor.fullname" . }}-webhook-cert-gen
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "novastor.fullname" . }}-webhook-cert-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  template:
    metadata:
      name: {{ include "novastor.fullname" . }}-webhook-cert-gen
      labels:
        {{- include "novastor.labels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "novastor.fullname" . }}-webhook-cert-gen
      containers:
        - name: cert-gen
          image: registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.5.1
          imagePullPolicy: IfNotPresent
          args:
            - create
            - --host={{ include "novastor.fullname" . }}-webhook,{{ include "novastor.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
            - --namespace={{ .Release.Namespace }}
            - --secret-name={{ include "novastor.fullname" . }}-webhook-cert
          env:
            - name: POD_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: SECRET_NAME
              value: {{ include "novastor.fullname" . }}-webhook-cert
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        fsGroup: 2000
{{- end }}
