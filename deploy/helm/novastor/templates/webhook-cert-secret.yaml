{{- if .Values.scheduler.webhook.enabled }}
{{- if .Values.scheduler.webhook.cert.existingSecret }}
# When an existing secret is specified, we don't create one.
# The deployment will use the existing secret referenced in values.yaml.
{{- else }}
# Certificates will be generated by the pre-install hook job.
# This placeholder ensures the secret exists; the hook job will populate it.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "novastor.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "novastor.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
{{- end }}
{{- end }}
