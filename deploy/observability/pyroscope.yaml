apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: novastor-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      nodeSelector:
        kubernetes.io/hostname: master-11
      containers:
      - name: pyroscope
        image: grafana/pyroscope:1.10.0
        ports:
        - containerPort: 4040
          name: http
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        hostPath:
          path: /var/lib/pyroscope
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: novastor-system
spec:
  selector:
    app: pyroscope
  ports:
  - name: http
    port: 4040
    targetPort: 4040
