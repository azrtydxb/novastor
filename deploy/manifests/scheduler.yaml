apiVersion: v1
kind: ServiceAccount
metadata:
  name: novastor-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: novastor-scheduler
rules:
  # Access to nodes for topology information
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Access to PVCs for NovaStor volume detection
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Access to PVs for topology information
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Access to pods for queue extension
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Access to storage classes for provisioner detection
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # Create events for scheduling decisions
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: novastor-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: novastor-scheduler
subjects:
  - kind: ServiceAccount
    name: novastor-scheduler
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: novastor-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    clientConnection:
      kubeconfig: /etc/kubernetes/scheduler.conf
    profiles:
      - schedulerName: novastor-scheduler
        plugins:
          preScore:
            enabled:
              - name: DataLocality
          score:
            enabled:
              - name: DataLocality
          queueSort:
            enabled:
              - name: DataLocality
        pluginConfig:
          - name: DataLocality
            args:
              localityWeight: 10
              minLocalityScore: 1
              rwxMode: balanced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novastor-scheduler
  namespace: kube-system
  labels:
    app: novastor-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novastor-scheduler
  template:
    metadata:
      labels:
        app: novastor-scheduler
    spec:
      serviceAccountName: novastor-scheduler
      containers:
        - name: scheduler
          image: ghcr.io/piwi3910/novastor/novastor-scheduler:latest
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=info
            - --locality-weight=10
            - --min-locality-score=1
            - --rwx-mode=balanced
            - --kubeconfig=/etc/kubernetes/scheduler.conf
          ports:
            - containerPort: 10251
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10251
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10251
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes/scheduler.conf
              subPath: scheduler.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: novastor-scheduler-config
      priorityClassName: system-cluster-critical
---
# The scheduler plugin can also run as a DaemonSet for node-local awareness
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: novastor-scheduler-node
  namespace: kube-system
  labels:
    app: novastor-scheduler-node
spec:
  selector:
    matchLabels:
      app: novastor-scheduler-node
  template:
    metadata:
      labels:
        app: novastor-scheduler-node
    spec:
      serviceAccountName: novastor-scheduler
      containers:
        - name: scheduler
          image: ghcr.io/piwi3910/novastor/novastor-scheduler:latest
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=info
            - --locality-weight=10
            - --min-locality-score=1
            - --rwx-mode=balanced
            - --kubeconfig=/etc/kubernetes/scheduler.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes/scheduler.conf
              subPath: scheduler.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: novastor-scheduler-config
      priorityClassName: system-cluster-critical
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - operator: Exists
