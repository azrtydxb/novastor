syntax = "proto3";

package nvme;

option go_package = "github.com/azrtydxb/novastor/api/proto/nvme";

// NVMeTargetService manages NVMe-oF/TCP targets on storage agent nodes.
// The CSI controller calls this service during CreateVolume/DeleteVolume
// to create and tear down backing block devices exposed via nvmet configfs.
service NVMeTargetService {
  // CreateTarget creates a sparse backing file, attaches a loop device,
  // and exposes it as an NVMe-oF/TCP target via nvmet configfs.
  // Returns the subsystem NQN, listen address, and port for the initiator.
  rpc CreateTarget(CreateTargetRequest) returns (CreateTargetResponse);

  // DeleteTarget removes the NVMe-oF/TCP target, detaches the loop device,
  // and deletes the sparse backing file.
  rpc DeleteTarget(DeleteTargetRequest) returns (DeleteTargetResponse);

  // SetANAState changes the ANA (Asymmetric Namespace Access) state for a
  // volume's NVMe-oF target. Used during active-passive failover to transition
  // a target between optimized (active) and inaccessible (passive) states.
  rpc SetANAState(SetANAStateRequest) returns (SetANAStateResponse);

  // SetupReplication configures the owner node to replicate writes to remote
  // replica targets. The owner connects as NVMe-oF initiator to each remote
  // target, creates a replica bdev that fans out writes with majority quorum,
  // and re-exports the replica bdev as the NVMe-oF target for this volume.
  rpc SetupReplication(SetupReplicationRequest) returns (SetupReplicationResponse);
}

message CreateTargetRequest {
  // volume_id is the unique volume identifier, used to derive the NQN and
  // backing file name.
  string volume_id = 1;

  // size_bytes is the requested size for the backing sparse file.
  int64 size_bytes = 2;

  // ana_state is the initial ANA state for the target. Valid values are
  // "optimized" (active path) and "inaccessible" (passive path).
  // If empty, defaults to "optimized".
  string ana_state = 3;

  // ana_group_id is the ANA group identifier for this target. All targets
  // sharing the same group ID transition state together during failover.
  uint32 ana_group_id = 4;
}

message CreateTargetResponse {
  // subsystem_nqn is the NVMe Qualified Name for the created subsystem,
  // e.g. "nqn.2024-01.io.novastor:vol-<uuid>".
  string subsystem_nqn = 1;

  // target_address is the IP address the NVMe-oF port is bound to.
  string target_address = 2;

  // target_port is the TCP port the NVMe-oF target listens on (default "4420").
  string target_port = 3;
}

message DeleteTargetRequest {
  // volume_id identifies the target to tear down.
  string volume_id = 1;
}

message DeleteTargetResponse {}

message SetANAStateRequest {
  // volume_id identifies the NVMe-oF target whose ANA state should change.
  string volume_id = 1;

  // ana_state is the desired ANA state. Valid values are "optimized"
  // (active, accepting I/O) and "inaccessible" (passive, rejecting I/O).
  string ana_state = 2;

  // ana_group_id is the ANA group to apply the state change to.
  uint32 ana_group_id = 3;
}

message SetANAStateResponse {}

// ReplicaTargetInfo describes a remote NVMe-oF target to replicate to.
message ReplicaTargetInfo {
  // address is the IP address of the remote agent hosting the replica.
  string address = 1;
  // port is the NVMe-oF TCP port (e.g. "4430").
  string port = 2;
  // nqn is the NVMe Qualified Name of the remote subsystem.
  string nqn = 3;
}

message SetupReplicationRequest {
  // volume_id identifies the volume to configure replication for.
  string volume_id = 1;
  // local_bdev_name is the SPDK bdev name for the local chunk volume
  // (e.g. "novastor_<volume_id>").
  string local_bdev_name = 2;
  // remote_targets is the list of remote NVMe-oF targets to replicate to.
  repeated ReplicaTargetInfo remote_targets = 3;
}

message SetupReplicationResponse {
  // replica_bdev_name is the name of the composite replica bdev.
  string replica_bdev_name = 1;
  // subsystem_nqn is the NQN of the re-exported NVMe-oF target.
  string subsystem_nqn = 2;
}
